name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: raxios.linux-x64-gnu.node

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: raxios.win32-x64-msvc.node

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: raxios.darwin-x64.node

          - os: macos-14
            target: aarch64-apple-darwin
            artifact: raxios.darwin-arm64.node

    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build -- --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts
        shell: bash
        run: |
          mv artifacts/raxios.linux-x64-gnu.node/raxios.linux-x64-gnu.node .
          mv artifacts/raxios.win32-x64-msvc.node/raxios.win32-x64-msvc.node .
          mv artifacts/raxios.darwin-x64.node/raxios.darwin-x64.node .
          mv artifacts/raxios.darwin-arm64.node/raxios.darwin-arm64.node .

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}